name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Compile/import smoke
        run: |
          python -m compileall -q src/payday
          python -c "import payday.repository"

      - name: Run test suite
        run: pytest

  verify-runtime-sha:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Verify runtime SHA is rendered by app
        env:
          PAYDAY_RELEASE_SHA: ${{ github.sha }}
        run: pytest tests/test_app.py -k commit_sha
